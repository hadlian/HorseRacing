<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>R5 Horse Racing Analyzer</title>
  <style>
    /* ── Variables ─────────────────────────────────────────────────────── */
    :root {
      --dark:    #1A1A2E;
      --navy:    #16213E;
      --mid:     #0F3460;
      --gold:    #C9A84C;
      --green:   #27AE60;
      --red:     #E74C3C;
      --orange:  #E67E22;
      --blue:    #2980B9;
      --text:    #DDE2EC;
      --muted:   #8899AA;
      --border:  #243352;
    }

    /* ── Reset ─────────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--dark);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size: 15px;
      line-height: 1.5;
      min-height: 100vh;
    }
    button { font-family: inherit; cursor: pointer; }

    /* ── Navbar ────────────────────────────────────────────────────────── */
    .navbar {
      background: var(--navy);
      border-bottom: 2px solid var(--gold);
      padding: 14px 28px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .navbar-logo {
      font-size: 1.3rem;
      font-weight: 700;
      color: var(--gold);
      letter-spacing: 0.06em;
    }
    .navbar-sub {
      color: var(--muted);
      font-size: 0.8rem;
    }

    /* ── Layout ────────────────────────────────────────────────────────── */
    .container {
      max-width: 1280px;
      margin: 0 auto;
      padding: 32px 24px 64px;
    }

    /* ── Card ──────────────────────────────────────────────────────────── */
    .card {
      background: var(--navy);
      border: 1px solid var(--border);
      border-radius: 12px;
      margin-bottom: 28px;
    }
    .card-head {
      padding: 16px 22px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 8px;
    }
    .card-title {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--gold);
    }
    .card-body { padding: 22px; }

    /* ── Drop zone ─────────────────────────────────────────────────────── */
    .drop-zone {
      border: 2px dashed var(--border);
      border-radius: 10px;
      padding: 44px 24px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.18s, background 0.18s;
      background: rgba(255,255,255,0.015);
      user-select: none;
    }
    .drop-zone:hover,
    .drop-zone.over {
      border-color: var(--gold);
      background: rgba(201,168,76,0.06);
    }
    .drop-icon { font-size: 2.8rem; margin-bottom: 10px; }
    .drop-main { font-size: 1rem; color: var(--text); margin-bottom: 4px; }
    .drop-hint { font-size: 0.82rem; color: var(--muted); }

    /* ── File chips ────────────────────────────────────────────────────── */
    .file-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 16px;
    }
    .file-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--mid);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 0.82rem;
    }
    .file-remove {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 1.1rem;
      line-height: 1;
      padding: 0;
    }
    .file-remove:hover { color: var(--red); }

    /* ── Options ───────────────────────────────────────────────────────── */
    .options-row {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 20px;
      margin-top: 18px;
    }
    .check-label {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.88rem;
      cursor: pointer;
    }
    .check-label input[type=checkbox] { accent-color: var(--gold); width: 15px; height: 15px; }

    /* ── Buttons ───────────────────────────────────────────────────────── */
    .btn-primary {
      background: var(--gold);
      color: var(--dark);
      border: none;
      border-radius: 8px;
      padding: 11px 32px;
      font-size: 0.92rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      transition: opacity 0.18s;
      margin-top: 20px;
    }
    .btn-primary:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-primary:not(:disabled):hover { opacity: 0.82; }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 7px 18px;
      font-size: 0.82rem;
      color: var(--text);
      transition: border-color 0.15s, color 0.15s;
    }
    .btn-outline:disabled { opacity: 0.3; cursor: not-allowed; }
    .btn-outline:not(:disabled):hover { border-color: var(--gold); color: var(--gold); }

    /* ── Loading ───────────────────────────────────────────────────────── */
    .loading-wrap {
      text-align: center;
      padding: 60px 24px;
    }
    .spinner {
      width: 44px; height: 44px;
      border: 4px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
      margin: 0 auto 14px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: var(--muted); font-size: 0.9rem; }

    /* ── Error banner ──────────────────────────────────────────────────── */
    .banner {
      border-radius: 8px;
      padding: 12px 16px;
      margin-bottom: 20px;
      font-size: 0.87rem;
    }
    .banner-error {
      background: rgba(231,76,60,0.12);
      border: 1px solid rgba(231,76,60,0.4);
      color: #ff8080;
    }
    .banner-warn {
      background: rgba(230,126,34,0.12);
      border: 1px solid rgba(230,126,34,0.4);
      color: #ffb86e;
    }

    /* ── Results header ────────────────────────────────────────────────── */
    .results-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 20px;
    }
    .results-title {
      font-size: 1.2rem;
      font-weight: 700;
      color: var(--gold);
    }
    .dl-group { display: flex; gap: 8px; }

    /* ── Race tabs ─────────────────────────────────────────────────────── */
    .race-tabs {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 22px;
    }
    .race-tab {
      background: var(--mid);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 16px;
      font-size: 0.82rem;
      color: var(--text);
      transition: all 0.15s;
    }
    .race-tab:hover { border-color: var(--gold); }
    .race-tab.active {
      background: var(--gold);
      color: var(--dark);
      border-color: var(--gold);
      font-weight: 600;
    }

    /* ── Race card ─────────────────────────────────────────────────────── */
    .race-card {
      background: var(--navy);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .race-hdr {
      background: var(--mid);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px 28px;
    }
    .race-name {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--gold);
      white-space: nowrap;
    }
    .race-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 6px 20px;
      font-size: 0.8rem;
    }
    .meta-item { display: flex; gap: 5px; align-items: center; }
    .meta-lbl { color: var(--muted); }
    .meta-val { color: var(--text); font-weight: 500; }

    .pace-pill {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.04em;
    }
    .pace-hot    { background: rgba(231,76,60,0.18);  color: #ff8080; border: 1px solid rgba(231,76,60,0.4); }
    .pace-normal { background: rgba(39,174,96,0.18);  color: #5ddb8e; border: 1px solid rgba(39,174,96,0.4); }
    .pace-slow   { background: rgba(41,128,185,0.18); color: #7abfff; border: 1px solid rgba(41,128,185,0.4); }

    /* ── Horse table ───────────────────────────────────────────────────── */
    .tbl-wrap { overflow-x: auto; }
    .horse-tbl {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.8rem;
      white-space: nowrap;
    }
    .horse-tbl thead th {
      background: rgba(0,0,0,0.25);
      color: var(--muted);
      font-weight: 600;
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 7px 10px;
      text-align: right;
      border-bottom: 1px solid var(--border);
    }
    .horse-tbl thead th:first-child,
    .horse-tbl thead th:nth-child(2),
    .horse-tbl thead th:nth-child(3) { text-align: left; }

    .horse-tbl tbody td {
      padding: 7px 10px;
      text-align: right;
      border-bottom: 1px solid rgba(255,255,255,0.03);
    }
    .horse-tbl tbody td:first-child,
    .horse-tbl tbody td:nth-child(2),
    .horse-tbl tbody td:nth-child(3) { text-align: left; }
    .horse-tbl tbody tr:hover { background: rgba(255,255,255,0.04); }
    .horse-tbl tbody tr.row-top  { background: rgba(39,174,96,0.08); }
    .horse-tbl tbody tr.row-val  { background: rgba(201,168,76,0.06); }
    .horse-tbl tbody tr.row-scratched { opacity: 0.4; text-decoration: line-through; }

    .pgm-num {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: var(--mid);
      border-radius: 4px;
      min-width: 24px;
      height: 22px;
      padding: 0 5px;
      font-weight: 600;
      font-size: 0.77rem;
    }

    /* Tier badges */
    .tier {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }
    .tier-HIGH   { background: rgba(39,174,96,0.2);   color: #5ddb8e; border: 1px solid rgba(39,174,96,0.45); }
    .tier-SOLID  { background: rgba(41,128,185,0.2);  color: #7abfff; border: 1px solid rgba(41,128,185,0.45); }
    .tier-FAIR   { background: rgba(230,126,34,0.2);  color: #ffb86e; border: 1px solid rgba(230,126,34,0.45); }
    .tier-SPEC   { background: rgba(231,76,60,0.2);   color: #ff8080; border: 1px solid rgba(231,76,60,0.45); }

    .comp-val { font-weight: 600; }
    .comp-hi  { color: #5ddb8e; }
    .comp-mid { color: #ffb86e; }
    .comp-lo  { color: var(--muted); }

    /* ── Picks ─────────────────────────────────────────────────────────── */
    .picks-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
      padding: 18px 20px;
      border-top: 1px solid var(--border);
    }
    .pick-box {
      border-radius: 8px;
      padding: 14px 16px;
    }
    .pick-box.pick-top {
      background: rgba(39,174,96,0.07);
      border: 1px solid rgba(39,174,96,0.28);
    }
    .pick-box.pick-val {
      background: rgba(201,168,76,0.07);
      border: 1px solid rgba(201,168,76,0.28);
    }
    .pick-lbl {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 6px;
    }
    .pick-top .pick-lbl { color: var(--green); }
    .pick-val .pick-lbl { color: var(--gold); }
    .pick-pgm-name {
      display: flex;
      align-items: baseline;
      gap: 8px;
      margin-bottom: 6px;
    }
    .pick-pgm-num {
      font-size: 1.6rem;
      font-weight: 700;
      color: #fff;
      line-height: 1;
    }
    .pick-horse-name {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text);
    }
    .pick-stats {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 16px;
      font-size: 0.78rem;
      color: var(--muted);
    }
    .pick-stats .sv { color: var(--text); font-weight: 600; }

    /* ── Exotics ───────────────────────────────────────────────────────── */
    .exotics-box {
      background: rgba(0,0,0,0.18);
      border-top: 1px solid var(--border);
      padding: 14px 20px;
    }
    .exotics-hdr {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--gold);
      margin-bottom: 10px;
    }
    .exotics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 6px;
    }
    .exotic-row { display: flex; gap: 8px; font-size: 0.82rem; align-items: baseline; }
    .exotic-key {
      color: var(--muted);
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      min-width: 72px;
    }
    .exotic-val { color: var(--text); }

    /* ── Raw text ──────────────────────────────────────────────────────── */
    details.raw-details {
      margin-top: 20px;
    }
    details.raw-details summary {
      cursor: pointer;
      color: var(--muted);
      font-size: 0.83rem;
      padding: 8px 0;
      user-select: none;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    details.raw-details summary::before {
      content: '▶';
      font-size: 0.65rem;
      transition: transform 0.15s;
    }
    details.raw-details[open] summary::before { transform: rotate(90deg); }
    details.raw-details summary:hover { color: var(--text); }
    .raw-pre {
      background: #0c0d1a;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px;
      overflow-x: auto;
      font-family: 'Courier New', Consolas, monospace;
      font-size: 0.74rem;
      line-height: 1.55;
      color: #c0cad8;
      white-space: pre;
      max-height: 640px;
      margin-top: 8px;
    }

    /* ── Empty / no parse ──────────────────────────────────────────────── */
    .empty-msg {
      padding: 40px 20px;
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
    }

    /* ── Bet recommendation ────────────────────────────────────────────── */
    .bet-box {
      border-top: 1px solid var(--border);
      padding: 16px 20px;
    }
    .bet-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    .bet-label {
      font-size: 0.68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }
    .bet-verdict {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 14px;
      border-radius: 20px;
      font-size: 0.82rem;
      font-weight: 700;
      letter-spacing: 0.05em;
    }
    .bet-strong { background: rgba(39,174,96,0.18);  color: #5ddb8e; border: 1px solid rgba(39,174,96,0.5); }
    .bet-yes    { background: rgba(39,174,96,0.10);  color: #5ddb8e; border: 1px solid rgba(39,174,96,0.35); }
    .bet-marginal { background: rgba(230,126,34,0.15); color: #ffb86e; border: 1px solid rgba(230,126,34,0.45); }
    .bet-no     { background: rgba(231,76,60,0.15);  color: #ff8080; border: 1px solid rgba(231,76,60,0.45); }
    .bet-score {
      font-size: 0.75rem;
      color: var(--muted);
      margin-left: auto;
    }
    .bet-body {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 24px;
    }
    @media (max-width: 580px) { .bet-body { grid-template-columns: 1fr; } }
    .bet-col-title {
      font-size: 0.67rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 5px;
    }
    .bet-col-title.pros { color: var(--green); }
    .bet-col-title.cons { color: var(--red); }
    .bet-list { list-style: none; display: flex; flex-direction: column; gap: 3px; }
    .bet-list li {
      display: flex;
      align-items: baseline;
      gap: 6px;
      font-size: 0.78rem;
      line-height: 1.4;
    }
    .bet-list li .dot { flex-shrink: 0; font-size: 0.6rem; }
    .bet-pro { color: #5ddb8e; }
    .bet-pro .dot { color: var(--green); }
    .bet-con { color: #ff8080; }
    .bet-con .dot { color: var(--red); }
    .bet-val-note {
      margin-top: 10px;
      padding: 8px 12px;
      background: rgba(201,168,76,0.08);
      border: 1px solid rgba(201,168,76,0.25);
      border-radius: 6px;
      font-size: 0.77rem;
      color: #d4b560;
    }

    /* ── View toggle (Overview / Race Detail) ──────────────────────────── */
    .view-toggle {
      display: inline-flex;
      background: rgba(0,0,0,0.25);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3px;
      gap: 3px;
    }
    .btn-view {
      background: transparent;
      border: none;
      border-radius: 6px;
      padding: 6px 18px;
      font-size: 0.82rem;
      color: var(--muted);
      transition: all 0.15s;
      white-space: nowrap;
    }
    .btn-view:hover:not(.active) { color: var(--text); }
    .btn-view.active {
      background: var(--gold);
      color: var(--dark);
      font-weight: 700;
    }

    /* ── Summary table ─────────────────────────────────────────────────── */
    .summary-tbl td { text-align: left; }
    .summary-tbl td:nth-child(6),
    .summary-tbl td:nth-child(7) { text-align: right; }
    .summary-tbl thead th { text-align: left; }
    .summary-tbl thead th:nth-child(6),
    .summary-tbl thead th:nth-child(7) { text-align: right; }
    .summary-row { cursor: pointer; }
    .summary-row:hover td { background: rgba(201,168,76,0.06) !important; }
    .summary-hint {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 8px;
      text-align: right;
    }
    .val-alt-line {
      font-size: 0.73rem;
      color: var(--muted);
      margin-top: 2px;
    }
    .val-alt-line .va-odds { color: var(--gold); font-weight: 600; }

    /* ── Scratch notice ─────────────────────────────────────────────────── */
    .scratch-notice {
      background: rgba(231,76,60,0.10);
      border-left: 4px solid var(--red);
      border-radius: 0 6px 6px 0;
      padding: 12px 16px;
      margin: 14px 20px 0;
      display: flex;
      flex-direction: column;
      gap: 5px;
    }
    .scratch-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #ff8080;
    }
    .scratch-detail { font-size: 0.82rem; color: var(--text); }
    .scratch-revised { font-size: 0.82rem; color: #5ddb8e; font-weight: 600; }

    /* ── Tight cluster pill ──────────────────────────────────────────────── */
    .tight-cluster-pill {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      background: rgba(230,126,34,0.18);
      color: #ffb86e;
      border: 1px solid rgba(230,126,34,0.45);
    }

    /* ── Manual scratch input ────────────────────────────────────────────── */
    .scratch-input-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 20px;
      border-top: 1px solid var(--border);
      background: rgba(231,76,60,0.04);
      flex-wrap: wrap;
    }
    .scratch-input-lbl {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      white-space: nowrap;
    }
    .scratch-input {
      background: var(--dark);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: 0.82rem;
      padding: 4px 10px;
      width: 80px;
    }
    .scratch-input:focus { outline: none; border-color: var(--red); }
    .scratch-input::placeholder { color: var(--muted); }
    .btn-scratch-add {
      background: rgba(231,76,60,0.18);
      border: 1px solid rgba(231,76,60,0.4);
      border-radius: 6px;
      color: #ff8080;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 4px 12px;
    }
    .btn-scratch-add:hover { background: rgba(231,76,60,0.28); }
    .scratch-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }
    .scratch-chip {
      display: flex;
      align-items: center;
      gap: 5px;
      background: rgba(231,76,60,0.15);
      border: 1px solid rgba(231,76,60,0.35);
      border-radius: 12px;
      padding: 2px 10px;
      font-size: 0.78rem;
      color: #ff8080;
      font-weight: 600;
    }
    .scratch-chip-remove {
      background: none;
      border: none;
      color: #ff8080;
      font-size: 1rem;
      line-height: 1;
      padding: 0;
      opacity: 0.7;
    }
    .scratch-chip-remove:hover { opacity: 1; }
    .exotics-warning {
      margin-top: 8px;
      font-size: 0.75rem;
      color: #ffb86e;
      font-style: italic;
    }

    /* ── Utility ───────────────────────────────────────────────────────── */
    .hidden { display: none !important; }
  </style>
</head>
<body>

<nav class="navbar">
  <span class="navbar-logo">🏇 R5 Analyzer</span>
  <span class="navbar-sub">BRIS DRF · Composite Handicapping</span>
</nav>

<div class="container">

  <!-- ── Upload card ────────────────────────────────────────────────────── -->
  <div class="card" id="uploadCard">
    <div class="card-head">
      <span class="card-title">Upload Race Files</span>
    </div>
    <div class="card-body">

      <div class="drop-zone" id="dropZone" tabindex="0" role="button"
           aria-label="Click or drop DRF / ZIP files here">
        <div class="drop-icon">📂</div>
        <p class="drop-main">Drop <strong>.DRF</strong> or <strong>.ZIP</strong> files here</p>
        <p class="drop-hint">or click to browse — multiple files OK</p>
        <input type="file" id="fileInput" multiple
               accept=".drf,.DRF,.zip,.ZIP" style="display:none">
      </div>

      <div class="file-list" id="fileList"></div>

      <div class="options-row">
        <label class="check-label">
          <input type="checkbox" id="scoutOpt">
          Auto Scout (scrape trainer quotes, scratches, sharp money — requires API key)
        </label>
        <label class="check-label">
          <input type="checkbox" id="pdfOpt">
          Generate PDF (slower — requires reportlab)
        </label>
      </div>

      <button class="btn-primary" id="analyzeBtn" disabled>
        Analyze Races
      </button>

    </div>
  </div>

  <!-- ── Error / warn banners ──────────────────────────────────────────── -->
  <div class="banner banner-error hidden" id="errorBanner"></div>
  <div class="banner banner-warn  hidden" id="warnBanner"></div>

  <!-- ── Loading ───────────────────────────────────────────────────────── -->
  <div class="loading-wrap hidden" id="loadingWrap">
    <div class="spinner"></div>
    <p class="loading-text">Running R5 analysis…</p>
  </div>

  <!-- ── Results ───────────────────────────────────────────────────────── -->
  <div class="hidden" id="resultsWrap">

    <div class="results-top">
      <h2 class="results-title" id="resultsTitle">Results</h2>
      <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap">
        <div class="view-toggle">
          <button class="btn-view" id="btnViewSummary" onclick="switchView('summary')">📋 Overview</button>
          <button class="btn-view active" id="btnViewDetail" onclick="switchView('detail')">🏇 Race Detail</button>
        </div>
        <div class="dl-group">
          <button class="btn-outline" id="btnTxt" disabled>⬇ TXT</button>
          <button class="btn-outline" id="btnPdf" disabled>⬇ PDF</button>
        </div>
      </div>
    </div>

    <!-- Summary view -->
    <div id="summaryView" class="hidden"></div>

    <!-- Detail view -->
    <div id="detailView">
      <div class="race-tabs" id="raceTabs"></div>
      <div id="raceContent"></div>
    </div>

    <details class="raw-details">
      <summary>Raw text output</summary>
      <pre class="raw-pre" id="rawPre"></pre>
    </details>

  </div>

</div><!-- /container -->

<script>
/* ── State ─────────────────────────────────────────────────────────────── */
let files       = [];
let jobId       = null;
let races       = [];
let pdfOk       = false;
let activeTab   = 0;
let viewMode    = 'detail';   // 'summary' | 'detail'
// Manual scratches: Map of raceIdx → Set of pgm strings
const manualScratches = {};

/* ── DOM refs ──────────────────────────────────────────────────────────── */
const dropZone     = document.getElementById('dropZone');
const fileInput    = document.getElementById('fileInput');
const fileList     = document.getElementById('fileList');
const analyzeBtn   = document.getElementById('analyzeBtn');
const pdfOpt       = document.getElementById('pdfOpt');
const scoutOpt     = document.getElementById('scoutOpt');
const loadingWrap  = document.getElementById('loadingWrap');
const errorBanner  = document.getElementById('errorBanner');
const warnBanner   = document.getElementById('warnBanner');
const resultsWrap  = document.getElementById('resultsWrap');
const resultsTitle = document.getElementById('resultsTitle');
const raceTabs       = document.getElementById('raceTabs');
const raceContent    = document.getElementById('raceContent');
const rawPre         = document.getElementById('rawPre');
const btnTxt         = document.getElementById('btnTxt');
const btnPdf         = document.getElementById('btnPdf');
const summaryView    = document.getElementById('summaryView');
const detailView     = document.getElementById('detailView');
const btnViewSummary = document.getElementById('btnViewSummary');
const btnViewDetail  = document.getElementById('btnViewDetail');

/* ── Upload zone ───────────────────────────────────────────────────────── */
dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') fileInput.click(); });

dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('over'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('over'));
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  dropZone.classList.remove('over');
  addFiles([...e.dataTransfer.files]);
});

fileInput.addEventListener('change', () => {
  addFiles([...fileInput.files]);
  fileInput.value = '';
});

function addFiles(incoming) {
  const allowed = new Set(['.drf', '.zip']);
  incoming.forEach(f => {
    const ext = f.name.slice(f.name.lastIndexOf('.')).toLowerCase();
    if (!allowed.has(ext)) return;
    if (!files.find(x => x.name === f.name)) files.push(f);
  });
  renderFileList();
  analyzeBtn.disabled = files.length === 0;
}

function removeFile(name) {
  files = files.filter(f => f.name !== name);
  renderFileList();
  analyzeBtn.disabled = files.length === 0;
}

function renderFileList() {
  fileList.innerHTML = files.map(f => `
    <div class="file-chip">
      📄 ${esc(f.name)}
      <button class="file-remove" title="Remove" onclick="removeFile(${JSON.stringify(f.name)})">×</button>
    </div>
  `).join('');
}

/* ── Analysis ──────────────────────────────────────────────────────────── */
analyzeBtn.addEventListener('click', runAnalysis);

async function runAnalysis() {
  if (!files.length) return;

  setLoading(true);
  hide(errorBanner); hide(warnBanner); hide(resultsWrap);

  const fd = new FormData();
  files.forEach(f => fd.append('files', f));
  fd.append('pdf',   pdfOpt.checked   ? 'true' : 'false');
  fd.append('scout', scoutOpt.checked ? 'true' : 'false');

  try {
    const res  = await fetch('/api/analyze', { method: 'POST', body: fd });
    const data = await res.json();

    if (!res.ok) throw new Error(data.error || `Server error ${res.status}`);

    if (data.errors && data.errors.length) {
      showBanner(warnBanner, '⚠ ' + data.errors.join('  |  '));
    }

    jobId  = data.job_id;
    races  = data.races  || [];
    pdfOk  = data.pdf_available;

    renderResults(data);

  } catch (err) {
    showBanner(errorBanner, '✖ ' + err.message);
  } finally {
    setLoading(false);
  }
}

/* ── View toggle ───────────────────────────────────────────────────────── */
function switchView(mode) {
  viewMode = mode;
  btnViewSummary.classList.toggle('active', mode === 'summary');
  btnViewDetail.classList.toggle('active',  mode === 'detail');
  if (mode === 'summary') {
    show(summaryView); hide(detailView);
  } else {
    hide(summaryView); show(detailView);
  }
}

function jumpToRace(idx) {
  switchView('detail');
  switchTab(idx);
  detailView.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

/* ── Summary table ─────────────────────────────────────────────────────── */
function buildSummary() {
  const rows = races.map((r, i) => {
    const top  = r.top_pick || {};
    const va   = r.value_alt || {};
    const rec  = calcBetRec(r, i) || {};
    const icon = rec.verdict === 'PLAY' ? '✅' : rec.verdict === 'NEAR' ? '⚠️' : '⛔';
    const vcls = rec.cls || 'bet-no';

    const isHot  = /HOT/i.test(r.pace_type  || '');
    const paceShort = isHot ? 'HOT' : (/SLOW/i.test(r.pace_type || '') ? 'SLOW' : 'NML');
    const paceCls   = isHot ? 'pace-hot' : 'pace-normal';
    const surf  = /turf/i.test(r.surface || '') ? 'T' : 'D';
    const dist  = `${r.distance || '?'} ${surf}`;
    const mlStr = (top.ml || '').replace(' ML', '');
    const ccls  = compClass(top.composite);

    /* speed horse count pill */
    const scMatch = (r.pace_type || '').match(/(\d+)\s+speed/i);
    const scPill  = scMatch
      ? ` <span style="font-size:0.68rem;color:var(--muted)">(${scMatch[1]}spd)</span>`
      : '';

    /* value alt line */
    const vaStr = va.pgm
      ? `<div class="val-alt-line">💰 Alt: #${esc(va.pgm)} ${esc(va.name)}
           <span class="va-odds">${(va.ml||'').replace(' ML','')}</span></div>`
      : '';

    return `
      <tr class="summary-row" onclick="jumpToRace(${i})">
        <td><span class="pgm-num">${esc(String(r.race_num ?? i+1))}</span></td>
        <td>${esc(dist)}</td>
        <td>$${esc(r.purse || '?')}</td>
        <td><span class="pace-pill ${paceCls}">${paceShort}</span>${scPill}</td>
        <td>
          <div>#${esc(top.pgm || '?')} <strong>${esc(top.name || '?')}</strong></div>
          ${vaStr}
        </td>
        <td><span class="comp-val ${ccls}">${esc(top.composite || '?')}</span></td>
        <td>${esc(mlStr || '?')}</td>
        <td><span class="bet-verdict ${vcls}" style="padding:2px 10px;font-size:0.72rem">${icon} ${esc(rec.verdict || '?')}</span></td>
      </tr>`;
  }).join('');

  summaryView.innerHTML = `
    <div class="tbl-wrap">
      <table class="horse-tbl summary-tbl">
        <thead>
          <tr>
            <th>Race</th>
            <th>Dist</th>
            <th>Purse</th>
            <th>Pace</th>
            <th>Top Pick / Value Alt</th>
            <th>Comp</th>
            <th>ML</th>
            <th>Verdict</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <p class="summary-hint">Click any row to open race detail ↗</p>`;
}

/* ── Render results ────────────────────────────────────────────────────── */
function renderResults(data) {
  rawPre.textContent = data.text || '';

  const tracks = [...new Set((data.races || []).map(r => r.track).filter(Boolean))];
  resultsTitle.textContent =
    tracks.length ? `${tracks.join(' / ')} — ${races.length} Race${races.length !== 1 ? 's' : ''}`
                  : `${races.length} Race${races.length !== 1 ? 's' : ''} analyzed`;

  /* Tabs */
  raceTabs.innerHTML = races.map((r, i) => {
    const label = r.race_num != null ? `Race ${r.race_num}` : `Race ${i + 1}`;
    return `<button class="race-tab${i === 0 ? ' active' : ''}" onclick="switchTab(${i})">${label}</button>`;
  }).join('');

  /* Downloads */
  btnTxt.disabled = !jobId;
  btnPdf.disabled = !pdfOk;

  /* Build summary (uses calcBetRec — must run after races is populated) */
  buildSummary();

  /* Default to detail view */
  switchView('detail');
  activeTab = 0;
  renderRace(0);
  show(resultsWrap);
}

function switchTab(idx) {
  activeTab = idx;
  document.querySelectorAll('.race-tab').forEach((t, i) => t.classList.toggle('active', i === idx));
  renderRace(idx);
}

function renderRace(idx) {
  const race = races[idx];
  if (!race) { raceContent.innerHTML = '<div class="empty-msg">No race data available.</div>'; return; }

  const paceClass = (/HOT/i).test(race.pace_type || '') ? 'pace-hot'
                  : (/SLOW/i).test(race.pace_type || '') ? 'pace-slow'
                  : 'pace-normal';
  const surfIcon  = /turf/i.test(race.surface || '') ? '🌿' : '🏃';

  raceContent.innerHTML = `
    <div class="race-card">
      <div class="race-hdr">
        <span class="race-name">${esc(race.track || '?')} · Race ${esc(String(race.race_num ?? ''))}</span>
        <div class="race-meta">
          ${metaItem('Date', fmtDate(race.date))}
          ${metaItem('Dist', `${surfIcon} ${esc(race.distance || '?')}`)}
          ${metaItem('Surface', esc(race.surface || '?'))}
          ${metaItem('Purse', `$${esc(race.purse || '?')}`)}
          <div class="meta-item">
            <span class="meta-lbl">Pace</span>
            <span class="pace-pill ${paceClass}">${esc(race.pace_type || '?')}</span>
          </div>
          ${race.tight_cluster ? `<div class="meta-item"><span class="tight-cluster-pill">⚠️ TIGHT CLUSTER${race.tight_cluster_spread ? ' · ' + race.tight_cluster_spread + ' pts' : ''}</span></div>` : ''}
        </div>
      </div>

      ${buildScratchNotices(race, idx)}
      ${buildScratchInput(idx)}
      ${buildHorseTable(race, idx)}
      ${buildPicks(race, idx)}
      ${buildBetRec(race, idx)}
      ${buildExotics(race, idx)}
    </div>
  `;
}

function metaItem(label, val) {
  return `<div class="meta-item"><span class="meta-lbl">${label}</span><span class="meta-val">${val}</span></div>`;
}

/* ── Horse table ───────────────────────────────────────────────────────── */
function buildHorseTable(race, raceIdx) {
  const horses = race.horses || [];
  if (!horses.length) {
    return `<div class="empty-msg">Horse data could not be parsed — see raw text below.</div>`;
  }

  const scratched = getScratchSet(raceIdx);
  const activeHorses = horses.filter(h => !scratched.has(h.pgm));
  const topPgm = activeHorses[0]?.pgm;                 // rank 1 of active horses
  const valPgm = (() => {
    // value alt: highest val score among non-top active horses
    const rest = activeHorses.slice(1);
    if (!rest.length) return null;
    return rest.reduce((best, h) =>
      (parseFloat(h.val) || 0) > (parseFloat(best.val) || 0) ? h : best
    ).pgm;
  })();

  const rows = horses.map(h => {
    const isScratched = scratched.has(h.pgm);
    const isTop = !isScratched && h.pgm === topPgm;
    const isVal = !isScratched && h.pgm === valPgm;
    const rowCls = isScratched ? 'row-scratched' : isTop ? 'row-top' : isVal ? 'row-val' : '';
    const ccls   = compClass(h.comp);
    const nameFlag = isScratched ? ' <span style="color:var(--red);font-size:0.72rem">SCR</span>'
                   : isTop ? ' 🏆' : isVal ? ' 💰' : '';

    return `
      <tr class="${rowCls}">
        <td><span class="pgm-num">${esc(h.pgm)}</span></td>
        <td>${esc(h.name)}${nameFlag}</td>
        <td>${esc(h.ml)}</td>
        <td>${esc(h.ws4)}</td>
        <td>${esc(h.trend)}</td>
        <td>${esc(h.fci)}</td>
        <td>${esc(h.vpar)}</td>
        <td>${esc(h.ped)}</td>
        <td>${esc(h.tj)}</td>
        <td>${esc(h.pce)}</td>
        <td>${esc(h.val)}</td>
        <td><span class="comp-val ${ccls}">${esc(h.comp)}</span></td>
        <td>${tierBadge(h.tier)}</td>
      </tr>`;
  }).join('');

  return `
    <div class="tbl-wrap">
      <table class="horse-tbl">
        <thead>
          <tr>
            <th>#</th><th>Horse</th><th>ML</th>
            <th>WS4</th><th>Trend</th><th>FCI</th><th>vPar</th>
            <th>Ped</th><th>T/J</th><th>Pce</th><th>Val</th>
            <th>Comp</th><th>Tier</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

/* ── Pick boxes ────────────────────────────────────────────────────────── */
function buildPicks(race, raceIdx) {
  const scratched    = getScratchSet(raceIdx);
  const activeHorses = (race.horses || []).filter(h => !scratched.has(h.pgm));
  const parts        = [];

  // Top pick: use revised rank-1 if original is scratched
  const topHorse = activeHorses[0];
  if (topHorse) {
    // Use engine top_pick data if pgm matches, otherwise build from horse row
    const orig    = race.top_pick || {};
    const isOrig  = orig.pgm === topHorse.pgm;
    const p = {
      pgm:       topHorse.pgm,
      name:      topHorse.name,
      ml:        topHorse.ml,
      composite: isOrig ? orig.composite : topHorse.comp,
      tier:      topHorse.tier,
    };
    const wasRevised = scratched.size > 0 && !isOrig;
    parts.push(`
      <div class="pick-box pick-top">
        <div class="pick-lbl">🏆 Top Win Pick${wasRevised ? ' <span style="font-size:0.65rem;color:#ffb86e">(revised)</span>' : ''}</div>
        <div class="pick-pgm-name">
          <span class="pick-pgm-num">#${esc(p.pgm)}</span>
          <span class="pick-horse-name">${esc(p.name)}</span>
        </div>
        <div class="pick-stats">
          <span>ML <span class="sv">${esc(p.ml)}</span></span>
          <span>Comp <span class="sv">${esc(p.composite)}</span></span>
          <span>${tierBadge(p.tier)}</span>
        </div>
      </div>`);
  }

  // Value alt: highest val score among non-top active horses
  const valHorse = activeHorses.slice(1).reduce((best, h) =>
    best == null || (parseFloat(h.val) || 0) > (parseFloat(best.val) || 0) ? h : best
  , null);
  if (valHorse) {
    const origVa  = race.value_alt || {};
    const isOrig  = origVa.pgm === valHorse.pgm;
    const p = {
      pgm:       valHorse.pgm,
      name:      valHorse.name,
      ml:        valHorse.ml,
      composite: isOrig ? origVa.composite : valHorse.comp,
      tier:      valHorse.tier,
    };
    const wasRevised = scratched.size > 0 && !isOrig;
    parts.push(`
      <div class="pick-box pick-val">
        <div class="pick-lbl">💰 Value Alt${wasRevised ? ' <span style="font-size:0.65rem;color:#ffb86e">(revised)</span>' : ''}</div>
        <div class="pick-pgm-name">
          <span class="pick-pgm-num">#${esc(p.pgm)}</span>
          <span class="pick-horse-name">${esc(p.name)}</span>
        </div>
        <div class="pick-stats">
          <span>ML <span class="sv">${esc(p.ml)}</span></span>
          <span>Comp <span class="sv">${esc(p.composite)}</span></span>
          <span>${tierBadge(p.tier)}</span>
        </div>
      </div>`);
  }

  return parts.length ? `<div class="picks-grid">${parts.join('')}</div>` : '';
}

/* ── Exotics ───────────────────────────────────────────────────────────── */
function buildExotics(race, raceIdx) {
  const ex      = race.exotics || {};
  const pairs   = [['WIN','win'],['EXACTA','exacta'],['TRIFECTA','trifecta'],['SUPERFECTA','superfecta']];
  const items   = pairs.filter(([, k]) => ex[k]).map(([label, k]) =>
    `<div class="exotic-row">
       <span class="exotic-key">${label}</span>
       <span class="exotic-val">${esc(ex[k])}</span>
     </div>`
  );
  if (!items.length) return '';
  const scratched   = getScratchSet(raceIdx);
  const warnHtml    = scratched.size > 0
    ? `<div class="exotics-warning">⚠️ Scratches detected — exotics shown are pre-scratch. Verify before wagering.</div>`
    : '';
  return `
    <div class="exotics-box">
      <div class="exotics-hdr">🎟 Exotics Structure</div>
      <div class="exotics-grid">${items.join('')}</div>
      ${warnHtml}
    </div>`;
}

/* ── Manual scratch helpers ────────────────────────────────────────────── */
function getScratchSet(raceIdx) {
  return manualScratches[raceIdx] || new Set();
}

function addScratch(raceIdx, pgm) {
  pgm = String(pgm).trim();
  if (!pgm) return;
  if (!manualScratches[raceIdx]) manualScratches[raceIdx] = new Set();
  manualScratches[raceIdx].add(pgm);
  renderRace(raceIdx);
  buildSummary();
}

function removeScratch(raceIdx, pgm) {
  if (manualScratches[raceIdx]) {
    manualScratches[raceIdx].delete(pgm);
    if (manualScratches[raceIdx].size === 0) delete manualScratches[raceIdx];
  }
  renderRace(raceIdx);
  buildSummary();
}

function buildScratchInput(raceIdx) {
  const scratched = getScratchSet(raceIdx);
  const chips = [...scratched].map(pgm =>
    `<span class="scratch-chip">
       #${esc(pgm)}
       <button class="scratch-chip-remove" onclick="removeScratch(${raceIdx}, '${esc(pgm)}')" title="Unscratch">×</button>
     </span>`
  ).join('');
  return `
    <div class="scratch-input-row">
      <span class="scratch-input-lbl">🚨 Mark Scratch</span>
      <input class="scratch-input" id="scratchInput_${raceIdx}"
             type="text" placeholder="#  pgm"
             onkeydown="if(event.key==='Enter'){addScratch(${raceIdx},this.value);this.value='';}"
             title="Type program number and press Enter">
      <button class="btn-scratch-add"
              onclick="const el=document.getElementById('scratchInput_${raceIdx}');addScratch(${raceIdx},el.value);el.value='';">
        Add
      </button>
      <div class="scratch-chips">${chips}</div>
    </div>`;
}

/* ── Scratch notices (engine-reported + manual) ────────────────────────── */
function buildScratchNotices(race, raceIdx) {
  const parts = [];

  // Engine-reported scratches (from stdout parsing)
  for (const s of race.scratches || []) {
    const revised = s.revised_pgm
      ? `<div class="scratch-revised">↳ Revised Top Pick: #${esc(s.revised_pgm)} ${esc(s.revised_name)}${s.revised_comp ? ' — Comp ' + esc(s.revised_comp) : ''}</div>`
      : '';
    parts.push(`
      <div class="scratch-notice">
        <div class="scratch-title">🚨 Scratch — #${esc(s.pgm)} ${esc(s.name)}</div>
        <div class="scratch-detail">Pre-scratch Rank ${esc(s.pre_rank)} — removed from field</div>
        ${revised}
      </div>`);
  }

  // Manual scratches
  const manSet = getScratchSet(raceIdx);
  for (const pgm of manSet) {
    const horse = (race.horses || []).find(h => h.pgm === pgm);
    const name  = horse ? horse.name : pgm;
    // Find revised pick: first non-scratched horse by table order (already ranked)
    const activeHorses = (race.horses || []).filter(h => !manSet.has(h.pgm));
    const revised = activeHorses[0];
    const revisedHtml = revised
      ? `<div class="scratch-revised">↳ Revised Top Pick: #${esc(revised.pgm)} ${esc(revised.name)} — Comp ${esc(revised.comp)}</div>`
      : '';
    parts.push(`
      <div class="scratch-notice">
        <div class="scratch-title">🚨 Manual Scratch — #${esc(pgm)} ${esc(name)}</div>
        <div class="scratch-detail">Removed from field by user</div>
        ${revisedHtml}
      </div>`);
  }

  return parts.join('');
}

/* ── Bet / No Bet ──────────────────────────────────────────────────────── */

/*
 * Primary gate:  composite score
 *   comp >= 6.0  → PLAY eligible
 *   comp 5.5–5.99 → NEAR (capped — cannot upgrade to PLAY regardless of factors)
 *   comp < 5.5   → SKIP (hard stop — no further analysis)
 *
 * Secondary scoring (determines PLAY vs NEAR within comp >= 6.0):
 *   Tier           HIGH=+2  SOLID=+1  FAIR/SPEC=0
 *   Value score    >=7.5=+2  >=6.0=+1  <5.0 flag only
 *   Odds adequacy  ML > minOdds+1=+2 | meets=+1 | below=-2
 *   FCI present    +1
 *   vPar           >=0=+1 | <=-20=-1
 *   Pace scenario  HOT+SPEED=-1 | HOT+CLOSER=+1 | NML+CLOSER=+1
 *
 * minOdds = max(mlOdds − 1, 1)  [R5 "min acceptable odds" formula]
 *
 * Verdict (within PLAY-eligible bracket, pts >= 3 → PLAY, else NEAR)
 */
function parseMl(ml) {
  if (!ml) return null;
  const m = String(ml).match(/(\d+)-(\d+)/);
  if (!m) return null;
  return parseInt(m[1], 10) / parseInt(m[2], 10);  // "2-1"→2.0, "5-2"→2.5
}

function calcBetRec(race, raceIdx) {
  const scratched    = getScratchSet(raceIdx);
  const activeHorses = (race.horses || []).filter(h => !scratched.has(h.pgm));
  // Use active rank-1 as effective top pick
  const topHorse = activeHorses[0];
  if (!topHorse) return null;
  const origTop  = race.top_pick || {};
  const top      = origTop.pgm === topHorse.pgm ? origTop : {
    pgm: topHorse.pgm, name: topHorse.name,
    ml: topHorse.ml, composite: topHorse.comp, tier: topHorse.tier,
  };

  const horse    = topHorse;
  const tier     = (top.tier || '').toUpperCase().replace('SPECULATIVE', 'SPEC');
  const comp     = parseFloat(top.composite) || 0;
  const mlOdds   = parseMl(top.ml);
  const val      = parseFloat(horse?.val) || 0;
  const fci      = horse?.fci;
  const vpar     = parseFloat(horse?.vpar);
  const pce      = (horse?.pce || '').toUpperCase();
  const hasFci   = fci && fci !== 'N/A';
  const minOdds  = mlOdds != null ? Math.max(mlOdds - 1, 1) : 1;
  const isHot    = /HOT/i.test(race.pace_type || '');
  const isNml    = /NML|NORMAL/i.test(race.pace_type || '');
  const isSpeed  = /^SPE/.test(pce);
  const isCloser = /^CLO/.test(pce);

  // Extract speed horse count from pace_type string e.g. "HOT PACE (6 speed)"
  const speedCount = (() => {
    const m = (race.pace_type || '').match(/(\d+)\s+speed/i);
    return m ? parseInt(m[1], 10) : null;
  })();

  const mlStr  = top.ml.replace(' ML', '');
  const minStr = `${minOdds % 1 === 0 ? minOdds : minOdds.toFixed(1)}-1`;

  // ── Primary gate: composite ──────────────────────────────────────────────
  if (comp < 5.5) {
    const gap = (6.0 - comp).toFixed(2);
    return {
      verdict: 'SKIP', cls: 'bet-no', pts: 0,
      pros: [],
      cons: [
        `comp ${comp} is ${gap} below the 6.0 play threshold`,
        ...(val >= 7.0 ? [`high value score ${val} signals overlay at ML — but comp too low to play`] : []),
      ],
      valNote: null,
    };
  }

  // ── Secondary scoring ────────────────────────────────────────────────────
  const pros = [], cons = [];
  let pts = 0;

  // 1 — Tier
  if      (tier === 'HIGH')  { pts += 2; pros.push(`HIGH confidence tier`); }
  else if (tier === 'SOLID') { pts += 1; pros.push(`SOLID confidence tier`); }
  else                        {           cons.push(`${tier} tier — limited model confidence`); }

  // 2 — Value score
  if      (val >= 7.5) { pts += 2; pros.push(`strong value score ${val} — model sees significant overlay`); }
  else if (val >= 6.0) { pts += 1; pros.push(`value score ${val} — model likes the price`); }
  else if (val < 5.0)  {           cons.push(`poor value score ${val} — possibly underlaid at ML`); }
  else                 {           cons.push(`thin value score ${val}`); }

  // 3 — Odds adequacy
  if (mlOdds != null) {
    if      (mlOdds >= minOdds + 1) { pts += 2; pros.push(`ML ${mlStr} exceeds min acceptable odds (${minStr})`); }
    else if (mlOdds >= minOdds)     { pts += 1; pros.push(`ML ${mlStr} meets min acceptable odds (${minStr})`); }
    else                             { pts -= 2; cons.push(`ML ${mlStr} below min acceptable odds (${minStr}) — too short at this price`); }
  }

  // 4 — FCI reliability
  if (hasFci)  { pts += 1; pros.push(`speed figure on record (FCI ${fci})`); }
  else          {           cons.push(`no BRIS speed figure — debut or surface switch`); }

  // 5 — vPar position
  if (!isNaN(vpar)) {
    const sign = vpar >= 0 ? '+' : '';
    if      (vpar >= 0)   { pts += 1; pros.push(`at or above class par (${sign}${vpar})`); }
    else if (vpar <= -20) { pts -= 1; cons.push(`well below class par (${vpar}) — significant class ask`); }
  }

  // 6 — Pace scenario
  if (isHot) {
    if (isSpeed) {
      pts -= 1;
      const detail = speedCount ? `${speedCount} speed horses in field` : 'contested pace';
      cons.push(`speed style in HOT pace — ${detail}, early pressure likely`);
    } else if (isCloser) {
      pts += 1;
      pros.push(`closer in HOT pace — pace scenario favours off-the-pace runners`);
    } else {
      cons.push(`HOT pace — contested early fractions, watch pace scenario`);
    }
  } else if (isNml && isCloser) {
    pts += 1;
    pros.push(`closer in NORMAL pace — clean stalking setup`);
  }

  // 7 — Tight cluster
  if (race.tight_cluster) {
    const spread = race.tight_cluster_spread ? ` (top-3 spread ${race.tight_cluster_spread} pts)` : '';
    cons.push(`tight speed cluster${spread} — low model separation, race is hard to call`);
  }

  // ── Verdict ──────────────────────────────────────────────────────────────
  // Composite score is the verdict — secondary factors are context, not gatekeepers.
  //   comp >= 6.0  → PLAY  (threshold met)
  //   comp 5.5–5.99 → NEAR (approaching threshold — watch for value angle)
  let verdict, cls;
  if   (comp >= 6.0) { verdict = 'PLAY'; cls = 'bet-yes'; }
  else               { verdict = 'NEAR'; cls = 'bet-marginal'; }

  // ── Value alt note ───────────────────────────────────────────────────────
  let valNote = null;
  const va = race.value_alt;
  if (va) {
    const vaHorse  = (race.horses || []).find(h => h.pgm === va.pgm);
    const vaOdds   = parseMl(va.ml);
    const vaVal    = parseFloat(vaHorse?.val) || 0;
    const vaPce    = (vaHorse?.pce || '').toUpperCase();
    const vaCloser = /^CLO/.test(vaPce);
    const vaStr    = va.ml.replace(' ML', '');

    if (isHot && vaCloser && vaOdds != null && vaOdds > (mlOdds || 0)) {
      // Classic HOT-pace value angle: closer at longer odds
      valNote = `💰 VALUE PLAY: #${va.pgm} ${va.name} [${vaStr}] — closer style in HOT pace at better odds (val ${vaVal}). Pace scenario may favour this over the ${mlStr} favourite.`;
    } else if (vaOdds != null && vaOdds > (mlOdds || 0) && vaVal >= 6.0) {
      valNote = `💰 Consider VALUE ALT #${va.pgm} ${va.name} [${vaStr}] — higher ML with value score ${vaVal}.`;
    }
  }

  return { verdict, cls, pts, pros, cons, valNote, comp };
}

function buildBetRec(race, raceIdx) {
  const rec = calcBetRec(race, raceIdx);
  if (!rec) return '';

  const icon = rec.verdict === 'PLAY' ? '✅'
             : rec.verdict === 'NEAR' ? '⚠️'
             :                          '⛔';

  const prosHtml = rec.pros.length
    ? `<div>
         <div class="bet-col-title pros">For</div>
         <ul class="bet-list">
           ${rec.pros.map(p => `<li class="bet-pro"><span class="dot">▶</span>${esc(p)}</li>`).join('')}
         </ul>
       </div>`
    : '';

  const consHtml = rec.cons.length
    ? `<div>
         <div class="bet-col-title cons">Against</div>
         <ul class="bet-list">
           ${rec.cons.map(c => `<li class="bet-con"><span class="dot">▶</span>${esc(c)}</li>`).join('')}
         </ul>
       </div>`
    : '';

  const valNoteHtml = rec.valNote
    ? `<div class="bet-val-note">${esc(rec.valNote)}</div>`
    : '';

  return `
    <div class="bet-box">
      <div class="bet-header">
        <span class="bet-label">Bet Recommendation</span>
        <span class="bet-verdict ${rec.cls}">${icon} ${rec.verdict}</span>
        <span class="bet-score">Comp ${rec.comp !== undefined ? rec.comp : '?'} · Score ${rec.pts}/10</span>
      </div>
      <div class="bet-body">
        ${prosHtml}
        ${consHtml}
      </div>
      ${valNoteHtml}
    </div>`;
}

/* ── Downloads ─────────────────────────────────────────────────────────── */
btnTxt.addEventListener('click', () => { if (jobId) location.href = `/api/download/txt/${jobId}`; });
btnPdf.addEventListener('click', () => { if (jobId && pdfOk) location.href = `/api/download/pdf/${jobId}`; });

/* ── Helpers ───────────────────────────────────────────────────────────── */
function tierBadge(tier) {
  const t = (tier || '').toUpperCase().replace('SPECULATIVE', 'SPEC');
  const valid = ['HIGH','SOLID','FAIR','SPEC'];
  const cls   = valid.includes(t) ? `tier-${t}` : 'tier-SPEC';
  return `<span class="tier ${cls}">${esc(t || '?')}</span>`;
}

function compClass(comp) {
  const v = parseFloat(comp);
  if (isNaN(v)) return '';
  return v >= 5.0 ? 'comp-hi' : v >= 3.5 ? 'comp-mid' : 'comp-lo';
}

function fmtDate(d) {
  if (!d || d.length < 8) return d || '?';
  const [y, m, day] = [d.slice(0,4), d.slice(4,6), d.slice(6,8)];
  try {
    return new Date(+y, +m - 1, +day)
      .toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  } catch { return d; }
}

function esc(s) {
  return String(s ?? '')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setLoading(on) {
  on ? show(loadingWrap) : hide(loadingWrap);
  analyzeBtn.disabled = on || files.length === 0;
}

function show(el) { el.classList.remove('hidden'); }
function hide(el) { el.classList.add('hidden'); }
function showBanner(el, msg) { el.textContent = msg; el.classList.remove('hidden'); }
</script>
